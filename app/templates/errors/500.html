{% extends "base.html" %}

{% block title %}Internal Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 fw-bold text-secondary mb-4">500</div>
    <h2 class="fw-bold mb-3">Something went wrong</h2>
    <p class="text-muted mb-4">An unexpected error occurred on our server. We are working to fix it as soon as possible.
    </p>
    <a href="{{ url_for('main.home') }}" class="btn btn-primary rounded-pill px-5 shadow">Back to Home</a>
</div>
{% endblock %}
