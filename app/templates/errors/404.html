{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 fw-bold text-primary mb-4">404</div>
    <h2 class="fw-bold mb-3">Oops! Page not found</h2>
    <p class="text-muted mb-4">The page you are looking for might have been removed, had its name changed, or is
        temporarily unavailable.</p>
    <a href="{{ url_for('main.home') }}" class="btn btn-primary rounded-pill px-5 shadow">Back to Home</a>
</div>
{% endblock %}
