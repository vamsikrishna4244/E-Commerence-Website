{% extends "base.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 fw-bold text-danger mb-4">403</div>
    <h2 class="fw-bold mb-3">Access Denied</h2>
    <p class="text-muted mb-4">You do not have permission to access this resource. Please contact your administrator if
        you believe this is an error.</p>
    <a href="{{ url_for('main.home') }}" class="btn btn-primary rounded-pill px-5 shadow">Back to Home</a>
</div>
{% endblock %}
